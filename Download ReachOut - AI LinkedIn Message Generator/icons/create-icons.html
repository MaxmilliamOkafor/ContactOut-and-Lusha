<!DOCTYPE html>
<html>
<head>
  <title>ReachOut Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    .instructions { background: #f0f0f0; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="instructions">
    <h2>ReachOut Icon Generator</h2>
    <p>Open this file in a browser, then right-click each canvas and "Save Image As" to create the icon files:</p>
    <ul>
      <li>icon16.png (16x16)</li>
      <li>icon48.png (48x48)</li>
      <li>icon128.png (128x128)</li>
    </ul>
  </div>

  <h3>16x16</h3>
  <canvas id="icon16" width="16" height="16"></canvas>

  <h3>48x48</h3>
  <canvas id="icon48" width="48" height="48"></canvas>

  <h3>128x128</h3>
  <canvas id="icon128" width="128" height="128"></canvas>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const scale = size / 128;

      // Background - rounded rectangle
      ctx.fillStyle = '#2563eb';
      ctx.beginPath();
      const radius = 20 * scale;
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fill();

      // Letter "R" with arrow
      ctx.fillStyle = 'white';
      ctx.font = `bold ${70 * scale}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('R', size * 0.45, size * 0.52);

      // Arrow pointing outward
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 6 * scale;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Arrow line
      ctx.beginPath();
      ctx.moveTo(size * 0.65, size * 0.35);
      ctx.lineTo(size * 0.85, size * 0.35);
      ctx.lineTo(size * 0.85, size * 0.55);
      ctx.stroke();

      // Arrow head
      ctx.beginPath();
      ctx.moveTo(size * 0.75, size * 0.25);
      ctx.lineTo(size * 0.85, size * 0.35);
      ctx.lineTo(size * 0.75, size * 0.45);
      ctx.stroke();
    }

    drawIcon(document.getElementById('icon16'));
    drawIcon(document.getElementById('icon48'));
    drawIcon(document.getElementById('icon128'));
  </script>
</body>
</html>
